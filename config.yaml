knowledge_dir: library
supported_extensions:
  - pdf
  - docx
  - txt
  - md
  - xlsx
model:
  model: qwen-plus
  model_server: dashscope
  dashscope_api_key_env: DASHSCOPE_API_KEY
  generate_cfg:
    temperature: 0.0
    top_p: 0.9
    max_input_tokens: 6500
    max_retries: 5
retriever:
  top_k: 5
  chunk_size: 1200
  chunk_overlap: 200
  bm25_weight: 0.4
  vector_weight: 0.6
  rerank: true
  type: hybrid
tools:
  enable_code_interpreter: false
cache:
  enabled: true
  capacity: 100
  ttl: 3600
evaluation:
  enabled: true
watch:
  enabled: true
  paths:
    - library
app:
  host: 0.0.0.0
  port: 7680
  enable_gradio: true
